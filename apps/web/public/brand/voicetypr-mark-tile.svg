    <path d="M738 394 C692 576 623 700 544 786" stroke="#fbfbfa" stroke-width="72"/>
    <path d="M512 326 L512 676" stroke="url(#sage)" stroke-width="46"/>
    <path d="M404 452 L404 514" stroke="url(#sage)" stroke-width="30"/>
    <path d="M452 414 L452 552" stroke="url(#sage)" stroke-width="30"/>
    <path d="M572 414 L572 552" stroke="url(#sage)" stroke-width="30"/>
    <path d="M620 452 L620 514" stroke="url(#sage)" stroke-width="30"/>
  </g>
  <circle cx="512" cy="248" r="36" fill="url(#sage)"/>
</svg>
