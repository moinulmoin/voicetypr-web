<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Voicetypr V2 launch social cover</title>
  <desc id="desc">A minimal Voicetypr launch image showing Talk to apps and agents, with app logos, Hermes Agent, OpenClaw, macOS, Windows, and the Offline Private Pay once promise.</desc>
  <defs>
    <linearGradient id="paper" x1="120" y1="0" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.54" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#ece6dc"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252529"/>
      <stop offset="0.58" stop-color="#141416"/>
      <stop offset="1" stop-color="#09090a"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6cfab"/>
      <stop offset="1" stop-color="#3f7d5b"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-25%" width="160%" height="165%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#171512" flood-opacity="0.13"/>
    </filter>
    <filter id="tinyShadow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1b1814" flood-opacity="0.10"/>
    </filter>
    <clipPath id="markClip"><rect x="559" y="50" width="82" height="82" rx="20"/></clipPath>
    <clipPath id="hermesClip"><circle cx="535" cy="508" r="23"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <circle cx="600" cy="315" r="290" fill="#ffffff" opacity="0.26"/>

  <g filter="url(#softShadow)">
    <rect x="559" y="50" width="82" height="82" rx="20" fill="url(#tile)"/>
    <g clip-path="url(#markClip)" fill="none" stroke-linecap="round" stroke-linejoin="round">
